name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Lint has pre-existing noise; report but don't fail the build (yet).
      - run: npm run lint
        continue-on-error: true
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          VITE_API_URL: https://api.eroderunnersclub.com

  server:
    name: Server (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
