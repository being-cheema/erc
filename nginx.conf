# ============================================================================
# Erode Runners Club — nginx configuration (DOCUMENTATION COPY)
#
# This file mirrors the host configs in /etc/nginx/sites-available/
# (api.eroderunnersclub.com, app.eroderunnersclub.com, eroderunnersclub.com).
# nginx runs on the HOST, not in docker. Editing this file changes NOTHING in
# production — apply changes manually on the server:
#
#   sudo vim /etc/nginx/sites-available/<site>
#   sudo nginx -t && sudo systemctl reload nginx
#
# ...then update this copy so the repo stays truthful.
#
# Layout:
#   api.eroderunnersclub.com — Express API (docker, 127.0.0.1:3001), Strava
#       OAuth callback + webhook, APK downloads, and (temporarily, for the
#       Capacitor OTA shell) the SPA itself.
#   app.eroderunnersclub.com — canonical SPA, served from
#       /var/www/erode-runners/dist.
#   eroderunnersclub.com     — apex, 301 → https://app.eroderunnersclub.com
# ============================================================================

# ----------------------------------------------------------------------------
# api.eroderunnersclub.com — API + downloads (+ SPA for the Capacitor shell)
# ----------------------------------------------------------------------------
server {
    server_name api.eroderunnersclub.com;

    client_max_body_size 20M;

    # Security headers for static content
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Auth/Strava function routes → Express (port 3001)
    location /functions/v1/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # API data routes
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Static assets with long cache (content-hashed filenames)
    location /assets/ {
        alias /var/www/erode-runners/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        gzip_static on;
    }

    # Server-side native OAuth callback — Strava redirects here directly.
    # Express handles code exchange + JWT creation, then 302s to deep link.
    location /auth/strava/callback {
        proxy_pass http://127.0.0.1:3001/functions/v1/strava-auth/callback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Strava webhook events — must respond within 2 seconds.
    # Prefix match (no trailing slash, no `=`) so the secret-path form
    # /webhook/<STRAVA_WEBHOOK_PATH_SECRET> passes through to Express too.
    location /webhook {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
    }

    # APK downloads (bypass SPA fallback). Served as a download, correct
    # Android package content type for .apk files.
    location /downloads/ {
        alias /var/www/erode-runners/downloads/;
        types { application/vnd.android.package-archive apk; }
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # Everything else → serve the SPA from dist/ (fallback to index.html).
    # Kept on api.* because the shipped Capacitor APK points its OTA
    # server.url here — do not remove until an APK pointing at app.* ships.
    location / {
        root /var/www/erode-runners/dist;
        try_files $uri $uri/ /index.html;

        # Never cache index.html (prevents stale WebView cache)
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            etag on;
        }
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.eroderunnersclub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.eroderunnersclub.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.eroderunnersclub.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name api.eroderunnersclub.com;
    return 404;
}

# ----------------------------------------------------------------------------
# app.eroderunnersclub.com — canonical user-facing SPA
# ----------------------------------------------------------------------------
server {
    listen 80;
    server_name app.eroderunnersclub.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.eroderunnersclub.com;

    root /var/www/erode-runners/dist;
    index index.html;

    # Static assets with long cache (content-hashed filenames)
    location /assets/ {
        alias /var/www/erode-runners/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        gzip_static on;
    }

    # APK downloads also available on app.* (same directory as api.*)
    location /downloads/ {
        alias /var/www/erode-runners/downloads/;
        types { application/vnd.android.package-archive apk; }
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    ssl_certificate /etc/letsencrypt/live/app.eroderunnersclub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.eroderunnersclub.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ----------------------------------------------------------------------------
# eroderunnersclub.com (apex + www) — 301 redirect to the app subdomain.
# Covers old printed QR codes/links (eroderunnersclub.com/m/<id> still works).
# Needs a certbot cert for the apex/www names before the 443 block can serve.
# ----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name eroderunnersclub.com www.eroderunnersclub.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://app.eroderunnersclub.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name eroderunnersclub.com www.eroderunnersclub.com;

    return 301 https://app.eroderunnersclub.com$request_uri;

    ssl_certificate /etc/letsencrypt/live/eroderunnersclub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eroderunnersclub.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
